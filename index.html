<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星曜2026端午礼品选购表（70-150元）</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #f5f0e8 0%, #fdf6ec 100%); min-height: 100vh; padding: 30px 20px; }
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 24px; }
.header h1 { font-size: 28px; color: #5c3d2e; letter-spacing: 3px; margin-bottom: 8px; }
.header p { font-size: 14px; color: #a07850; }
.bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.bar .btn { padding: 10px 22px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; }
.btn-add { background: #00b894; color: white; }
.btn-add:hover { background: #00a381; transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,184,148,.3); }
.btn-reset { background: #636e72; color: white; }
.btn-reset:hover { background: #535c5e; }
.summary { background: white; border-radius: 12px; padding: 18px 28px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; gap: 32px; flex-wrap: wrap; align-items: center; }
.summary-item { text-align: center; }
.summary-item .num { font-size: 26px; font-weight: 700; color: #e17055; }
.summary-item .label { font-size: 12px; color: #a0a0a0; margin-top: 2px; }
table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); font-size: 13px; }
thead tr { background: linear-gradient(90deg, #e17055, #fab1a0); }
thead th { padding: 16px 10px; color: white; font-size: 13px; font-weight: 700; text-align: center; letter-spacing: 1px; white-space: nowrap; }
tbody tr { border-bottom: 1px solid #f0ebe5; transition: background 0.2s; }
tbody tr:hover { background: #fff9f3 !important; }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 12px 10px; text-align: center; vertical-align: middle; }
td.editable { cursor: text; }
td.editable:focus { outline: 2px solid #e17055; outline-offset: -2px; background: #fffaf5; border-radius: 3px; }
.img-cell { cursor: pointer; position: relative; display: inline-block; }
.img-cell img { max-width: 140px; max-height: 110px; object-fit: contain; border-radius: 8px; transition: transform .2s, box-shadow .2s; }
.img-cell:hover img { transform: scale(1.05); box-shadow: 0 4px 16px rgba(0,0,0,.15); }
.img-cell .zoom-icon { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.5); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
.img-cell:hover .zoom-icon { opacity: 1; }
.no-img { width: 140px; height: 100px; background: #f0ebe5; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: #b2bec3; font-size: 12px; text-align: center; line-height: 1.4; }
.btn-del { background: #ff7675; color: white; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 16px; cursor: pointer; transition: all .2s; line-height: 1; padding: 0; }
.btn-del:hover { background: #d63031; transform: scale(1.1); }
.discount { font-weight: 700; color: #d63031; font-size: 15px; }
.btn-img-up { background: #0984e3; color: white; border: none; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.btn-img-up:hover { background: #0767b3; }
.btn-img-rm { background: #ff7675; color: white; border: none; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.btn-img-rm:hover { background: #d63031; }
.img-actions { margin-top: 5px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
.upload-hint { display: inline-flex; align-items: center; gap: 4px; color: #0984e3; cursor: pointer; font-size: 12px; }
.upload-hint:hover { color: #0767b3; text-decoration: underline; }
.lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.92); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
.lightbox.active { display: flex; }
.lightbox img { max-width: 92vw; max-height: 85vh; object-fit: contain; border-radius: 8px; background: #222; }
.lightbox .lb-info { color: white; margin-top: 12px; font-size: 14px; text-align: center; }
.lightbox .lb-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; background: none; border: none; line-height: 1; }
.lightbox .lb-prev, .lightbox .lb-next { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 40px; background: rgba(255,255,255,.15); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.lightbox .lb-prev:hover, .lightbox .lb-next:hover { background: rgba(255,255,255,.3); }
.lightbox .lb-prev { left: 20px; }
.lightbox .lb-next { right: 20px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); z-index: 9998; justify-content: center; align-items: center; }
.modal.active { display: flex; }
.modal-inner { background: white; border-radius: 16px; padding: 30px; width: 480px; max-width: 90vw; box-shadow: 0 8px 40px rgba(0,0,0,.2); }
.modal-inner h3 { margin-bottom: 20px; color: #5c3d2e; }
.modal-inner label { display: block; font-size: 13px; font-weight: 600; color: #636e72; margin-bottom: 4px; margin-top: 12px; }
.modal-inner input, .modal-inner textarea { width: 100%; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 14px; margin-bottom: 4px; }
.modal-inner textarea { height: 60px; resize: vertical; }
.modal-inner .btn-row { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.modal-inner .btn-cancel { background: #b2bec3; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
.modal-inner .btn-submit { background: #00b894; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
.footer { text-align: center; margin-top: 24px; color: #b2bec3; font-size: 13px; }
@media (max-width: 768px) {
  body { padding: 10px 6px; }
  table { font-size: 11px; }
  thead th, tbody td { padding: 8px 4px; }
  .img-cell img { max-width: 80px; max-height: 70px; }
  .no-img { width: 80px; height: 60px; font-size: 10px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎋 星曜 · 2026端午礼品选购表</h1>
    <p>预算区间：折后 <b>70 ~ 150</b> 元 &nbsp;|&nbsp; 折扣：标价 × 0.7 &nbsp;|&nbsp; <span id="genTime"></span></p>
  </div>
  <div class="bar">
    <button class="btn btn-add" onclick="openAddModal()">➕ 添加礼品</button>
    <button class="btn btn-reset" onclick="resetData()">🔄 恢复初始数据</button>
    <span style="flex:1;"></span>
    <select id="filterSup" onchange="renderTable()">
      <option value="">全部供货商</option>
      <option value="欢玺满堂">欢玺满堂</option>
      <option value="YOUKOO">YOUKOO</option>
      <option value="YOUKU">YOUKU</option>
    </select>
    <input type="text" id="filterName" placeholder="🔍 搜索礼品名..." oninput="renderTable()" style="width:180px;">
  </div>
  <div class="summary">
    <div class="summary-item"><div class="num" id="countTotal">-</div><div class="label">符合预算款式</div></div>
    <div class="summary-item"><div class="num" id="countSup">-</div><div class="label">参与供货商</div></div>
    <div class="summary-item"><div class="num" id="rangePrice">-</div><div class="label">折后价格区间</div></div>
    <div style="flex:1;font-size:13px;color:#636e72;line-height:1.8;">
      💡 点击图片放大 &nbsp;|&nbsp; 点击单元格编辑 &nbsp;|&nbsp; <span style="color:#d63031;">×</span> 删除行 &nbsp;|&nbsp; ➕ 添加礼品 &nbsp;|&nbsp; 📷 上传/更换图片<br>
      📦 以上价格不含税运，100份以上享集采价，具体定制需求请联系供应商客服
    </div>
  </div>
  <table>
    <thead>
      <tr>
        <th style="width:50px;">操作</th>
        <th style="width:72px;">供货商</th>
        <th style="width:155px;">礼品名称</th>
        <th style="width:155px;">礼品图片</th>
        <th style="width:60px;">标价</th>
        <th style="width:75px;">折后费用</th>
        <th>备注</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="footer">星曜市场部 · 2026端午礼品选购 · 折后 70~150 元区间</div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox()">&times;</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-info" id="lbTitle"></div>
</div>

<input type="file" id="imgFileInput" accept="image/*" style="display:none;" onchange="handleImgFileChange(event)">

<div class="modal" id="addModal">
  <div class="modal-inner">
    <h3>🎁 添加新礼品</h3>
    <label>供货商</label>
    <input type="text" id="addSup" placeholder="如：欢玺满堂">
    <label>礼品名称</label>
    <input type="text" id="addName" placeholder="礼品名称">
    <label>标价（元）</label>
    <input type="number" id="addPrice" placeholder="如：199" min="1" oninput="updateAddDiscount()">
    <label>折后费用（自动计算）</label>
    <input type="text" id="addDiscount" disabled style="color:#d63031;font-weight:700;">
    <label>备注</label>
    <textarea id="addNote" placeholder="产品配置、规格尺寸等"></textarea>
    <label>图片（可选）</label>
    <input type="file" id="addImgFile" accept="image/*" onchange="handleAddImgFile(this)" style="margin-bottom:8px;">
    <input type="text" id="addImg" placeholder="或粘贴图片URL">
    <div id="addImgPreview" style="margin-top:8px;display:none;text-align:center;">
      <img id="addImgPrevImg" src="" style="max-width:200px;max-height:120px;border-radius:8px;border:1px solid #dfe6e9;">
      <div><button onclick="clearAddImg()" style="margin-top:4px;background:#ff7675;color:white;border:none;border-radius:4px;padding:3px 12px;font-size:12px;cursor:pointer;">✕ 移除图片</button></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-submit" onclick="addProduct()">确认添加</button>
    </div>
  </div>
</div>

function cloneData(d) { return d.map(function(p) { return Object.assign({}, p); }); }
var g_data = cloneData(INI_PRODUCTS);
var lbSrc = null;

console.log('Products loaded: ' + INI_PRODUCTS.length);
document.getElementById('genTime').textContent = '生成时间：' + new Date().toLocaleString('zh-CN');

function renderTable() {
  var sf = document.getElementById('filterSup').value;
  var nf = document.getElementById('filterName').value.toLowerCase();
  var filtered = g_data.filter(function(p) {
    if (sf && p.supplier !== sf) return false;
    if (nf && !p.name.toLowerCase().includes(nf)) return false;
    return true;
  });
  var tb = document.getElementById('tableBody');
  tb.innerHTML = '';
  filtered.forEach(function(p, idx) {
    var di = g_data.indexOf(p);
    var bg = idx % 2 === 0 ? '#fafafa' : '#ffffff';
    var sc = p.supplier === '欢玺满堂' ? '#5c3d2e' : (p.supplier === 'YOUKOO' ? '#0984e3' : '#e17055');
    var ih;
    if (p.img) {
      ih = '<div class="img-cell" onclick="openLightbox(event, ' + di + ')" title="点击放大"><img src="' + p.img + '" alt="' + esc(p.name) + '"><span class="zoom-icon">\ud83d\udd0d</span></div>'
        + '<div class="img-actions"><button class="btn-img-up" onclick="event.stopPropagation();editImage(' + di + ')">\u270f\ufe0f\u66f4\u6362</button><button class="btn-img-rm" onclick="event.stopPropagation();removeImage(' + di + ')">\ud83d\uddd1\ufe0f\u5220\u9664</button></div>';
    } else {
      ih = '<div class="no-img">\u6682\u65e0\u56fe\u7247</div>'
        + '<div class="img-actions"><button class="btn-img-up" onclick="event.stopPropagation();editImage(' + di + ')">\ud83d\udcf7\u4e0a\u4f20</button></div>';
    }
    var rh = '<tr style="background:' + bg + ';">'
      + '<td><button class="btn-del" onclick="deleteProduct(' + di + ')" title="删除">&times;</button></td>'
      + '<td class="editable" contenteditable="true" onblur="updateCell(' + di + ',\'supplier\',this.textContent)" style="font-weight:600;color:' + sc + ';">' + esc(p.supplier) + '</td>'
      + '<td class="editable" contenteditable="true" onblur="updateCell(' + di + ',\'name\',this.textContent)" style="font-weight:600;color:#2d3436;text-align:left;">' + esc(p.name) + '</td>'
      + '<td>' + ih + '</td>'
      + '<td class="editable" contenteditable="true" onblur="updatePrice(' + di + ',this.textContent)">' + p.price + '</td>'
      + '<td class="discount">\xa5' + p.discount + '</td>'
      + '<td class="editable" contenteditable="true" onblur="updateCell(' + di + ',\'note\',this.textContent)" style="font-size:12px;color:#74b9ff;text-align:left;line-height:1.6;">' + esc(p.note) + '</td>'
      + '</tr>';
    tb.insertAdjacentHTML('beforeend', rh);
  });
  updateSummary(filtered);
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function updateSummary(f) {
  document.getElementById('countTotal').textContent = f.length;
  var ss = {}; f.forEach(function(p){ss[p.supplier]=1;});
  document.getElementById('countSup').textContent = Object.keys(ss).length;
  if (f.length) {
    document.getElementById('rangePrice').textContent = '\xa5' + Math.min.apply(null,f.map(function(p){return p.discount;})) + ' ~ \xa5' + Math.max.apply(null,f.map(function(p){return p.discount;}));
  } else { document.getElementById('rangePrice').textContent = '-'; }
}
function updateCell(idx, field, value) { g_data[idx][field] = value.trim(); }
function updatePrice(idx, value) {
  var n = parseFloat(value.replace(/[^0-9.]/g,''));
  if (!isNaN(n) && n > 0) { g_data[idx].price = n; g_data[idx].discount = Math.round(n*0.7*10)/10; }
  renderTable();
}
function deleteProduct(idx) {
  if (!confirm('\u786e\u5b9a\u5220\u9664\u300c' + g_data[idx].name + '\u300d\u5417\uff1f')) return;
  g_data.splice(idx,1); renderTable();
}
// Image edit/remove
var imgEditIdx = null;
function editImage(idx) {
  imgEditIdx = idx;
  document.getElementById('imgFileInput').click();
}
function removeImage(idx) {
  if (!confirm('\u786e\u5b9a\u5220\u9664\u300c' + g_data[idx].name + '\u300d\u7684\u56fe\u7247\u5417\uff1f')) return;
  g_data[idx].img = null;
  renderTable();
}
function handleImgFileChange(e) {
  var file = e.target.files[0];
  if (!file) { imgEditIdx = null; return; }
  if (!file.type.startsWith('image/')) { alert('\u8bf7\u9009\u62e9\u56fe\u7247\u6587\u4ef6\uff01'); imgEditIdx = null; e.target.value = ''; return; }
  var reader = new FileReader();
  reader.onload = function(ev) {
    if (imgEditIdx !== null) {
      g_data[imgEditIdx].img = ev.target.result;
      renderTable();
    }
    imgEditIdx = null;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
// Add modal image upload
var addImgData = null;
function handleAddImgFile(input) {
  var file = input.files[0];
  if (!file) { return; }
  if (!file.type.startsWith('image/')) { alert('\u8bf7\u9009\u62e9\u56fe\u7247\u6587\u4ef6\uff01'); input.value = ''; return; }
  var reader = new FileReader();
  reader.onload = function(ev) {
    addImgData = ev.target.result;
    document.getElementById('addImgPrevImg').src = ev.target.result;
    document.getElementById('addImgPreview').style.display = 'block';
    document.getElementById('addImg').value = '';
  };
  reader.readAsDataURL(file);
}
function clearAddImg() {
  addImgData = null;
  document.getElementById('addImgPreview').style.display = 'none';
  document.getElementById('addImgFile').value = '';
}
function openAddModal() {
  document.getElementById('addSup').value = '';
  document.getElementById('addName').value = '';
  document.getElementById('addPrice').value = '';
  document.getElementById('addDiscount').value = '';
  document.getElementById('addNote').value = '';
  document.getElementById('addImg').value = '';
  document.getElementById('addImgFile').value = '';
  addImgData = null;
  document.getElementById('addImgPreview').style.display = 'none';
  document.getElementById('addModal').classList.add('active');
}
function closeAddModal() { document.getElementById('addModal').classList.remove('active'); }
function updateAddDiscount() {
  var p = parseFloat(document.getElementById('addPrice').value);
  document.getElementById('addDiscount').value = (!isNaN(p) && p>0) ? ('\xa5' + (Math.round(p*0.7*10)/10)) : '';
}
function addProduct() {
  var s = document.getElementById('addSup').value.trim();
  var n = document.getElementById('addName').value.trim();
  var p = parseFloat(document.getElementById('addPrice').value);
  var t = document.getElementById('addNote').value.trim();
  var u = document.getElementById('addImg').value.trim();
  var img = addImgData || u || null;
  if (!s || !n || isNaN(p) || p<=0) { alert('\u8bf7\u586b\u5199\u4f9b\u8d27\u5546\u3001\u793c\u54c1\u540d\u79f0\u548c\u6709\u6548\u6807\u4ef7\uff01'); return; }
  var d = Math.round(p*0.7*10)/10;
  var np = {supplier:s, name:n, price:p, discount:d, note:t, img:img};
  var idx = g_data.length;
  for (var i=0;i<g_data.length;i++) { if (g_data[i].discount <= d) { idx = i; break; } }
  g_data.splice(idx,0,np);
  closeAddModal(); renderTable();
  setTimeout(function(){ var rs=document.querySelectorAll('tbody tr'); if(rs[idx]) rs[idx].scrollIntoView({behavior:'smooth',block:'center'}); },100);
}
function resetData() {
  if (!confirm('\u786e\u5b9a\u6062\u590d\u521d\u59cb\u6570\u636e\uff1f\u6240\u6709\u4fee\u6539\u5c06\u4e22\u5931\u3002')) return;
  g_data = cloneData(INI_PRODUCTS);
  document.getElementById('filterSup').value='';
  document.getElementById('filterName').value='';
  renderTable();
}
// Lightbox (single image mode)
function openLightbox(event, dataIdx) {
  event.stopPropagation();
  var p = g_data[dataIdx];
  if (!p.img) return;
  lbSrc = p.img;
  document.getElementById('lbImg').src = p.img;
  document.getElementById('lbTitle').textContent = p.name + ' - ' + p.supplier;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(event) {
  if (event && event.target !== document.getElementById('lightbox') && event.target.className !== 'lb-close') return;
  document.getElementById('lightbox').classList.remove('active');
}
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
});
document.getElementById('addModal').addEventListener('click', function(e) { if (e.target===this) closeAddModal(); });
renderTable();

</script>
